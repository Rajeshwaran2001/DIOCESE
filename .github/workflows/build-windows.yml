name: Build Windows EXE

# Builds the Diocese Certificate Manager into a standalone Windows app with
# Nuitka (mirrors Python/build.bat). Runs on every push/PR that touches the
# Python app, and publishes a release zip when a v* tag is pushed.

on:
  push:
    branches: [main]
    paths:
      - "Python/**"
      - ".github/workflows/build-windows.yml"
  pull_request:
    paths:
      - "Python/**"
      - ".github/workflows/build-windows.yml"
  # Manual release: run from the Actions tab, type a version. The workflow
  # builds, then creates the git tag on the latest commit and publishes a
  # GitHub Release with the zip + installer attached.
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 1.0.1 (a 'v' is added automatically). Leave the run a plain build by NOT using this trigger."
        required: true
        type: string

permissions:
  contents: write # needed to upload assets to a GitHub Release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: bash
        run: |
          # Read from version.txt by default
          v=$(cat version.txt | tr -d '\r\n' | tr -d 'v')
          
          # Override if this is a manual release
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            v="${{ github.event.inputs.version }}"
            v="${v#v}"
            # Overwrite version.txt so Nuitka embeds the release version
            echo "$v" > version.txt
          fi
          
          # Nuitka expects a 4-part version (e.g. 1.0.0.0)
          nuitka_v="$v"
          dots=$(echo "$nuitka_v" | tr -cd '.' | wc -c)
          if [ "$dots" -eq 2 ]; then
            nuitka_v="${nuitka_v}.0"
          fi
          
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "nuitka_version=$nuitka_v" >> "$GITHUB_OUTPUT"
          echo "Release tag: v$v"
          echo "Nuitka version: $nuitka_v"

      # Python 3.8 is the last release that supports Windows 7, which is the
      # deployment target for this app — keep it pinned.
      - name: Set up Python 3.8 (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          architecture: x64

      # MSVC is preinstalled on windows-latest; Nuitka picks it up automatically.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with Nuitka (standalone)
        run: |
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=tk-inter `
            --windows-disable-console `
            --windows-icon-from-ico=assets\app.ico `
            --include-package-data=customtkinter `
            --include-data-dir=assets=assets `
            --include-data-files=version.txt=version.txt `
            --company-name="Diocese of Madurai Ramnad CSI" `
            --product-name="Diocese Certificate Manager" `
            --file-version=${{ steps.ver.outputs.nuitka_version }} `
            --product-version=${{ steps.ver.outputs.nuitka_version }} `
            --file-description="Certificate data entry and printing" `
            --copyright="Diocese of Madurai Ramnad CSI" `
            --output-dir=dist `
            main.py

      - name: Verify build output
        run: |
          if (-not (Test-Path "dist\main.dist\main.exe")) {
            Write-Error "Build failed: dist\main.dist\main.exe not found"
            exit 1
          }
          Write-Host "Build OK -> dist\main.dist\main.exe"

      # Package the whole standalone folder (it must ship together, not just the exe).
      - name: Package standalone folder
        run: Compress-Archive -Path dist\main.dist\* -DestinationPath DioceseCertificateManager-windows.zip -Force

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: DioceseCertificateManager-windows
          path: Python/DioceseCertificateManager-windows.zip
          if-no-files-found: error

      # --- Installer (Inno Setup) ---------------------------------------------

      # setup.iss bundles vc_redist.x64.exe and installs it silently on Win7
      # boxes that lack the Universal CRT. Fetch it into installer\redist\.
      - name: Download VC++ redistributable
        run: |
          New-Item -ItemType Directory -Force -Path installer\redist | Out-Null
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile installer\redist\vc_redist.x64.exe

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        working-directory: Python/installer
        run: iscc /dMyAppVersion=${{ steps.ver.outputs.version }} setup.iss

      - name: Verify installer output
        run: |
          if (-not (Test-Path "installer\Output\DioceseCertManager-Setup.exe")) {
            Write-Error "Installer build failed: DioceseCertManager-Setup.exe not found"
            exit 1
          }
          Write-Host "Installer OK -> installer\Output\DioceseCertManager-Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DioceseCertManager-Setup
          path: Python/installer/Output/DioceseCertManager-Setup.exe
          if-no-files-found: error

      # --- Release (manual only) ----------------------------------------------

      # Creates the tag on the commit this run was started from (the latest
      # commit of the selected branch) and publishes the Release with assets.
      - name: Publish to GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            Python/DioceseCertificateManager-windows.zip
            Python/installer/Output/DioceseCertManager-Setup.exe
          fail_on_unmatched_files: true
